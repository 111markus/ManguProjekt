<!DOCTYPE html>

<html>
<head>
  <title>Gun Model Test</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.6.1/dist/aframe-extras.min.js"></script>
</head>
<body>
  <a-scene>
    <a-light type="ambient" color="#fff" intensity="1"></a-light>
    <a-light type="directional" color="#fff" intensity="1" position="2 4 3"></a-light>

    <a-camera position="0 1.6 2" look-controls="enabled:false">
    </a-camera>

    <!-- Gun model in world space so we can see it -->
    <a-entity
      id="gun-test"
      gltf-model="url(/models/fps-rig-akm.glb)"
      position="0 1 0"
      scale="0.1 0.1 0.1"
      animation-mixer="clip: Armature|Idle; loop: repeat"
    ></a-entity>

    <a-sky color="#333"></a-sky>
    <a-plane rotation="-90 0 0" width="10" height="10" color="#555"></a-plane>
  </a-scene>

  <div style="position:fixed;top:10px;left:10px;color:white;font-family:monospace;z-index:9999;background:rgba(0,0,0,0.7);padding:10px" id="log">
    Loading...
  </div>

  <script>
    const logEl = document.getElementById('log');
    const gunEl = document.getElementById('gun-test');

    gunEl.addEventListener('model-loaded', function(e) {
      logEl.textContent = 'MODEL LOADED! ✅';
      console.log('Model loaded', e);
      // Log animations
      const mesh = gunEl.getObject3D('mesh');
      if (mesh && mesh.animations) {
        logEl.textContent += '\nAnimations: ' + mesh.animations.map(a => a.name).join(', ');
      }
    });

    gunEl.addEventListener('model-error', function(e) {
      logEl.textContent = 'MODEL ERROR ❌: ' + JSON.stringify(e.detail);
      console.error('Model error', e);
    });
  </script>
</body>
</html>
