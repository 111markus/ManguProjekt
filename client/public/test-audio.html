<!DOCTYPE html>
<html>
<head><title>Audio Test</title></head>
<body style="background:#222;color:#fff;font-family:sans-serif;text-align:center;padding:40px">
  <h1>Audio Test</h1>
  <p>Click the buttons to test if audio files play:</p>
  <br/>
  <button onclick="playFire()" style="padding:20px 40px;font-size:20px;cursor:pointer">🔫 Play Fire</button>
  &nbsp;&nbsp;
  <button onclick="playReload()" style="padding:20px 40px;font-size:20px;cursor:pointer">🔄 Play Reload</button>
  <br/><br/>
  <p id="status">Click a button...</p>

  <script>
    function playFire() {
      document.getElementById('status').textContent = 'Playing fire.mp3...';
      const a = new Audio('/models/fire.mp3');
      a.volume = 1.0;
      a.play()
        .then(() => document.getElementById('status').textContent = '✅ fire.mp3 playing!')
        .catch(e => document.getElementById('status').textContent = '❌ Error: ' + e.message);
    }
    function playReload() {
      document.getElementById('status').textContent = 'Playing reload.mp3...';
      const a = new Audio('/models/reload.mp3');
      a.volume = 1.0;
      a.play()
        .then(() => document.getElementById('status').textContent = '✅ reload.mp3 playing!')
        .catch(e => document.getElementById('status').textContent = '❌ Error: ' + e.message);
    }
  </script>
</body>
</html>
